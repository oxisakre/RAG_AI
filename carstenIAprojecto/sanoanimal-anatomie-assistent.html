<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sanoanimal Anatomie-Assistent</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #1a3c34;
    background: linear-gradient(170deg, #f8f5f0 0%, #eee9e0 50%, #e8e2d8 100%);
  }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c4a97d50; border-radius: 6px; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes slideRight { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  @keyframes typing { 0%,60%,100%{opacity:.25} 30%{opacity:1} }

  #app { height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  .sa-header {
    background: linear-gradient(135deg, #1a3c34 0%, #264f43 40%, #1a3c34 100%);
    padding: 10px 20px; border-bottom: 3px solid #c4a97d; flex-shrink: 0; z-index: 100;
  }
  .sa-header-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; }
  .sa-logo-area { display:flex; align-items:center; gap:10px; }
  .sa-logo-mark {
    width:34px; height:34px; border-radius:8px;
    background: linear-gradient(135deg, #c4a97d, #d8c49a);
    color:#1a3c34; font-family:'Playfair Display',Georgia,serif;
    font-weight:700; font-size:13px; display:flex; align-items:center; justify-content:center; letter-spacing:1px;
  }
  .sa-logo-title { font-family:'Playfair Display',Georgia,serif; font-size:16px; font-weight:700; color:#fff; line-height:1.2; }
  .sa-logo-sub { font-size:10.5px; color:#c4a97d; font-weight:400; letter-spacing:.4px; }
  .sa-header-badge { font-size:10.5px; color:#c4a97d; padding:3px 10px; border:1px solid #c4a97d35; border-radius:20px; font-weight:500; white-space:nowrap; }

  .sa-controls { max-width:1200px; width:100%; margin:0 auto; padding:10px 16px; display:flex; flex-wrap:wrap; gap:12px; align-items:center; flex-shrink:0; }
  .sa-ctrl-group { display:flex; align-items:center; gap:6px; }
  .sa-ctrl-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:#8a7b6b; min-width:42px; }
  .sa-pills { display:flex; gap:4px; flex-wrap:wrap; }
  .sa-pill {
    padding:5px 13px; border-radius:20px; border:1.5px solid #d4c4a8; background:transparent;
    color:#6a7b6e; font-size:11.5px; font-weight:500; cursor:pointer; transition:all .2s;
    font-family:'Source Sans 3',sans-serif; white-space:nowrap;
  }
  .sa-pill:hover { border-color:#1a3c34; color:#1a3c34; }
  .sa-pill.active { background:#1a3c34; color:#fff; border-color:#1a3c34; box-shadow:0 2px 8px #1a3c3430; }
  .sa-layer-pill {
    padding:5px 11px; border-radius:20px; border:1.5px solid #d4c4a8; background:transparent;
    color:#6a7b6e; font-size:11.5px; font-weight:500; cursor:pointer; transition:all .2s;
    font-family:'Source Sans 3',sans-serif; display:flex; align-items:center; gap:4px; white-space:nowrap;
  }
  .sa-layer-pill:hover { border-color:#888; }
  .sa-layer-pill.active { color:#fff; border-color:transparent; }
  .sa-layer-pill.active.lk { background:linear-gradient(135deg,#d4ba8a,#c4a97d); box-shadow:0 2px 8px #c4a97d50; }
  .sa-layer-pill.active.lm { background:linear-gradient(135deg,#c94c4c,#a33a3a); box-shadow:0 2px 8px #c94c4c50; }
  .sa-layer-pill.active.lf { background:linear-gradient(135deg,#6b5b95,#554880); box-shadow:0 2px 8px #6b5b9550; }
  .sa-layer-pill.active.lo { background:linear-gradient(135deg,#d4a76a,#b88d50); box-shadow:0 2px 8px #d4a76a50; }

  .sa-main { flex:1; min-height:0; max-width:1200px; width:100%; margin:0 auto; padding:0 16px 16px; display:flex; gap:16px; overflow:hidden; }
  .sa-model-area { flex:1; min-width:0; display:flex; flex-direction:column; transition:all .3s; }
  .sa-model-area.with-info { flex:0 0 56%; }
  .sa-model-card { flex:1; min-height:0; background:#fff; border-radius:14px; padding:12px; box-shadow:0 3px 20px rgba(26,60,52,.06); border:1px solid #e8e2d8; display:flex; flex-direction:column; overflow:hidden; }
  .sa-model-viewport { flex:1; min-height:0; background:radial-gradient(ellipse at 50% 40%,#f8f5f008,#f4efe8); border-radius:10px; display:flex; justify-content:center; align-items:center; padding:8px; overflow:hidden; }
  .sa-model-viewport svg { width:100%; height:100%; max-height:100%; }
  .sa-model-hint { text-align:center; margin-top:8px; font-size:12px; color:#8a7b6b; font-weight:500; flex-shrink:0; }

  .sa-region { cursor:pointer; transition:all .25s ease; opacity:.72; }
  .sa-region:hover { opacity:.9; filter:brightness(1.05); }
  .sa-region.selected { opacity:1; }
  .sa-region-label { font-family:'Source Sans 3',sans-serif; font-size:10px; font-weight:600; fill:#1a3c34; pointer-events:none; user-select:none; }

  .sa-info { flex:0 0 42%; background:#fff; border-radius:14px; box-shadow:0 3px 20px rgba(26,60,52,.06); border:1px solid #e8e2d8; display:none; flex-direction:column; overflow:hidden; animation:slideRight .3s ease; }
  .sa-info.visible { display:flex; }
  .sa-info-head { padding:14px 18px 10px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #f0ebe4; flex-shrink:0; }
  .sa-info-title-wrap { display:flex; align-items:center; gap:6px; }
  .sa-info-icon { font-size:22px; }
  .sa-info-title { font-family:'Playfair Display',Georgia,serif; font-size:17px; font-weight:700; color:#1a3c34; }
  .sa-layer-badge { font-size:10.5px; font-weight:600; color:#8a7b6b; background:#f8f5f0; padding:3px 10px; border-radius:12px; display:flex; align-items:center; gap:3px; white-space:nowrap; flex-shrink:0; }
  .sa-info-body { flex:1; min-height:0; overflow-y:auto; padding:16px 18px; }
  .sa-info-text { font-size:13.5px; line-height:1.75; color:#3a4a3e; animation:fadeIn .3s ease; }
  .sa-info-actions { padding:10px 18px 14px; display:flex; gap:8px; border-top:1px solid #f0ebe4; flex-shrink:0; }
  .sa-btn-chat { flex:1; padding:9px 14px; background:linear-gradient(135deg,#1a3c34,#2a5c4a); color:#fff; border:none; border-radius:10px; font-size:12.5px; font-weight:600; cursor:pointer; font-family:'Source Sans 3',sans-serif; }
  .sa-btn-chat:hover { box-shadow:0 3px 12px #1a3c3440; }
  .sa-btn-close-info { padding:9px 14px; background:#f8f5f0; color:#8a7b6b; border:1px solid #e8e2d8; border-radius:10px; font-size:12.5px; font-weight:500; cursor:pointer; font-family:'Source Sans 3',sans-serif; }

  .sa-fab { position:fixed; bottom:20px; right:20px; width:52px; height:52px; border-radius:50%; background:linear-gradient(135deg,#1a3c34,#2a5c4a); border:2.5px solid #c4a97d; box-shadow:0 4px 18px rgba(26,60,52,.3); cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:80; font-size:20px; animation:pulse 3s infinite; }
  .sa-fab:hover { transform:scale(1.08); }

  .sa-chat { position:fixed; bottom:20px; right:20px; width:min(395px,calc(100vw - 28px)); height:min(540px,calc(100vh - 90px)); background:#fff; border-radius:18px; box-shadow:0 8px 40px rgba(26,60,52,.2); border:1px solid #ddd; display:none; flex-direction:column; z-index:200; overflow:hidden; animation:slideUp .3s ease; }
  .sa-chat.visible { display:flex; }
  .sa-chat-head { padding:12px 16px; background:linear-gradient(135deg,#1a3c34,#2a5c4a); color:#fff; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #c4a97d; flex-shrink:0; }
  .sa-chat-head-left { display:flex; align-items:center; gap:7px; }
  .sa-chat-head-title { font-family:'Playfair Display',Georgia,serif; font-weight:700; font-size:14px; }
  .sa-chat-close { background:none; border:none; color:#c4a97d; font-size:18px; cursor:pointer; padding:3px 7px; border-radius:6px; }
  .sa-chat-msgs { flex:1; min-height:0; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:9px; background:#faf8f5; }
  .sa-chat-welcome { text-align:center; padding:28px 14px; animation:fadeIn .5s ease; }
  .sa-chat-welcome-icon { font-size:30px; margin-bottom:10px; }
  .sa-chat-welcome-title { font-family:'Playfair Display',Georgia,serif; font-size:15px; font-weight:600; color:#1a3c34; margin-bottom:6px; }
  .sa-chat-welcome-sub { font-size:12.5px; color:#5a6b5e; line-height:1.5; }
  .sa-msg { max-width:84%; padding:9px 13px; border-radius:14px; animation:fadeIn .2s ease; font-size:13px; line-height:1.6; word-wrap:break-word; white-space:pre-wrap; }
  .sa-msg.user { align-self:flex-end; background:linear-gradient(135deg,#1a3c34,#2a5c4a); color:#fff; border-bottom-right-radius:4px; }
  .sa-msg.assistant { align-self:flex-start; background:#fff; color:#1a3c34; border:1px solid #e8e2d8; border-bottom-left-radius:4px; }
  .sa-typing { display:flex; gap:5px; padding:3px 0; }
  .sa-typing span { width:7px; height:7px; border-radius:50%; background:#c4a97d; display:inline-block; animation:typing 1.4s infinite; }
  .sa-typing span:nth-child(2) { animation-delay:.2s; }
  .sa-typing span:nth-child(3) { animation-delay:.4s; }
  .sa-chat-input-area { padding:10px 12px; border-top:1px solid #e8e2d8; display:flex; gap:7px; background:#fff; flex-shrink:0; }
  .sa-chat-input { flex:1; padding:9px 13px; border-radius:12px; border:1.5px solid #e8e2d8; font-size:13.5px; outline:none; font-family:'Source Sans 3',sans-serif; background:#faf8f5; color:#1a3c34; }
  .sa-chat-input:focus { border-color:#c4a97d; }
  .sa-chat-send { width:40px; height:40px; border-radius:11px; border:none; background:linear-gradient(135deg,#1a3c34,#2a5c4a); color:#fff; font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:'Source Sans 3',sans-serif; }
  .sa-chat-send:disabled { opacity:.45; cursor:default; }

  .sa-quick-questions { display:flex; flex-wrap:wrap; gap:6px; padding:0 14px 10px; flex-shrink:0; }
  .sa-qq { padding:6px 12px; border-radius:16px; border:1px solid #e0d8cc; background:#faf8f5; color:#5a6b5e; font-size:11.5px; cursor:pointer; font-family:'Source Sans 3',sans-serif; transition:all .2s; white-space:nowrap; }
  .sa-qq:hover { background:#1a3c34; color:#fff; border-color:#1a3c34; }

  @media (max-width:767px) {
    .sa-main { flex-direction:column; padding-bottom:0; }
    .sa-model-area.with-info { flex:1 !important; }
    .sa-info.visible { position:fixed; bottom:0; left:0; right:0; border-radius:18px 18px 0 0; max-height:65vh; z-index:90; box-shadow:0 -4px 30px rgba(26,60,52,.15); animation:slideUp .3s ease; }
    .sa-info-handle { display:flex !important; justify-content:center; padding:8px 0 2px; cursor:pointer; }
    .sa-info-handle-bar { width:36px; height:4px; border-radius:4px; background:#d4c4a8; }
    .sa-header-badge { display:none; }
    .sa-layer-pill .lbl { display:none; }
  }
  @media (min-width:768px) {
    .sa-info-handle { display:none !important; }
  }
</style>
</head>

<div id="app"></div>
<script>
// ═══════════════════════════════════════════════
// SANOANIMAL ANATOMIE-ASSISTENT — Standalone HTML
// ═══════════════════════════════════════════════

// All knowledge base texts use backtick strings to avoid quote-escaping issues
const ANATOMY_KB = {
  kopf: {
    title: `Kopf & Sch\u00e4del`, icon: "\u{1F9E0}",
    layers: {
      knochen: `Der Pferdeschädel besteht aus 29 beweglich verbundenen Knochen mit nur einem echten Gelenk \u2013 dem Kiefergelenk. Die feinen bindegewebigen Nähte (Suturen) erlauben passive Beweglichkeit. An der Crista nuchae (harte Kante zwischen den Ohren) setzt das Nackenrückenband an. Das Nasenbein hat einen freien rostralen Anteil, der bei unsachgemäßem Halfter leicht brechen kann. Die Stirnhöhlen wärmen und befeuchten die Atemluft. Das Siebbein filtert Staub und Krankheitserreger. Im Tränenbein (Os lacrimale) verläuft der Tränenkanal. Die Jochleiste ist Ansatzpunkt des M. masseter \u2013 dem stärksten Muskel des Körpers mit bis zu 5 Tonnen Presskraft.`,
      muskeln: `Der M. masseter an der Jochleiste ist der stärkste Muskel im Pferdekörper (bis zu 5 Tonnen Presskraft). Am Kopf setzen außerdem wichtige Halsmuskeln an: Der M. longissimus capitis et atlantis streckt bei beidseitiger Aktivierung Genick und Hals, bei einseitiger bewirkt er Drehung und Seitwärtsbiegung. Der M. sternocephalicus beugt beidseitig das Genick. Der M. brachiocephalicus führt bei Kopffixierung die Vordergliedmaße vor und ist der Fluchtinitiator.`,
      organe: `Die Augen sitzen seitlich und ermöglichen fast 360\u00b0 Rundumsicht \u2013 der tote Winkel liegt nur unmittelbar vor und hinter dem Pferd. Die waagerechte Pupille bietet ein größeres Horizontbild. Das Gleitsichtbrillen-Prinzip: Kopf gesenkt = Nahsicht (Futter), Kopf erhoben = Fernsicht (Feinde). Im Siebbein sitzen die Riechrezeptoren \u2013 Pferde nutzen ihren Geruchssinn intensiver als Menschen. Geschmacksknospen auf der Zunge unterscheiden süß, sauer, salzig, bitter. Zähne: Milch- zu Bleibend-Wechsel im 3.\u20135. Lebensjahr. Raspelgebiss zerkleinert Futter auf unter 2 mm. Zahnabnutzung ca. 2\u20133 mm/Jahr.`,
      faszien: `Die Kopffaszien verbinden die verschiedenen Knochen des Schädels und umhüllen die Kaumuskulatur. Die temporale Faszie bedeckt den M. temporalis an der Schläfe. Einschränkungen der Suturbeweglichkeit durch zu enge Stirn- oder Nasenriemen können über die faszialen Strukturen weitreichende Auswirkungen haben und zu Kopfschmerzen beim Pferd führen.`
    }
  },
  hals: {
    title: `Hals & Genick`, icon: "\u{1F992}",
    layers: {
      knochen: `Der Hals besteht aus 7 Halswirbeln (wie bei fast allen Säugetieren). Der Atlas (1. HW) trägt den Kopf und hat typische Atlasflügel. Der Axis (2. HW) hat einen zahnförmigen Fortsatz \u2013 zusammen mit dem Atlas bildet er ein Zapfengelenk für die Kopfdrehung. Das Genick ist ein Ellipsoidgelenk zwischen Schädel und Atlas und ermöglicht Nicken, Schütteln und Drehen. Die Halswirbel 3\u20137 sind rund und kompakt, ohne lange Fortsätze \u2013 das ermöglicht die große Beweglichkeit des Halses.`,
      muskeln: `M. longissimus capitis et atlantis: Beidseitig Strecker von Genick/Hals, einseitig Dreher/Seitwärtsbieger. M. sternocephalicus: Beidseitig Beuger. M. brachiocephalicus: Vielseitigster Halsmuskel \u2013 führt Vordergliedmaße vor, bestimmt Gangart und Gangmaß, ist Fluchtinitiator. M. scalenus: Unterstützt Einatmung. M. trapezius: Streckt Hals, bewegt Schulterblatt. M. splenius: Halsstrecker. M. spinalis cervicis: Strecker der Hals-/Brustwirbelsäule.`,
      organe: `Durch den Hals verlaufen lebenswichtige Strukturen: Die Halsschlagader (Arteria carotis) führt sauerstoffreiches Blut zum Kopf. Die Speiseröhre \u2013 ein muskulöser Schlauch ohne Knorpelspangen \u2013 transportiert das Futter per Peristaltik Richtung Magen. Die Luftröhre (Trachea) wird durch Knorpelspangen offengehalten und ist innen mit Flimmerepithel ausgekleidet. Der Kehlkopf bildet die Öffnung zu Speiseröhre und Luftröhre \u2013 der Kehldeckel verschließt die Luftröhre beim Schlucken. Pferde können nur durch die Nase atmen.`,
      faszien: `Die Halsfaszien bilden mehrere Schichten, die die verschiedenen Muskelgruppen und Strukturen des Halses umhüllen und voneinander trennen. Das Nackenrückenband (Ligamentum nuchae) zieht sich von der Crista nuchae über die gesamte Wirbelsäule bis zum Kreuzbein und bildet zusammen mit der Rückenmuskulatur die Gegenspannung zur Bauchmuskulatur.`
    }
  },
  schulter: {
    title: `Schulter & Vorhand`, icon: "\u{1F4AA}",
    layers: {
      knochen: `Das Pferd hat kein Schlüsselbein \u2013 der Rumpf ist nicht knöchern mit dem Vorderbein verbunden. Der Brustkorb hängt elastisch über Muskeln und Faszien zwischen den Schulterblättern. Das Schulterblatt (Os scapula) ist ein flacher Knochen mit einer dorsalen Knorpelkappe (darf nicht gequetscht werden). Das Schultergelenk (Buggelenk) ist ein Kugelgelenk. Der Oberarm (Os humerus) ist ein kurzer, dicker Röhrenknochen. Das Ellbogengelenk ist ein Scharniergelenk mit Schnappwirkung.`,
      muskeln: `M. serratus ventralis thoracis et cervicis: Der sogenannte gezahnte Muskelgurt trägt den Rumpf zwischen den Schulterblättern. Diagnoserelevanz: Kraniale Delle + kaudale Beule vor dem Schulterblatt = vorhandlastiges Pferd; umgekehrt = über den Rücken gearbeitetes Pferd. M. pectoralis ascendens + M. subclavius = pektoraler Muskelgurt. M. trapezius, M. rhomboideus, M. latissimus dorsi befestigen das Schulterblatt dorsal. Protraktion und Retraktion werden durch verschiedene Muskelgruppen gesteuert.`,
      organe: `Im Bereich der Vorhand befinden sich: Das Herz \u2013 kranial ventral im Brustkorb, zwischen den Vorderbeinen hinter dem Brustbein, abhörbar auf der linken Seite. Gewicht ca. 0,6\u20131% der Körpermasse (Großpferd ca. 5 kg). Ruhepuls ca. 36/min. Ca. 40% der Pferde haben einen Herzfehler. Die Lunge füllt den Brustkorb aus. Das Lymphsystem (Kehlgangslymphknoten) schwillt bei Erkältungen an.`,
      faszien: `Die Fascia superficialis und die tiefere Fascia profunda umhüllen den gesamten Schultergürtel. Da kein Schlüsselbein vorhanden ist, wird die Aufhängung des Rumpfes zwischen den Schulterblättern wesentlich durch myofasziale Strukturen gewährleistet. Diese Rumpftragevorrichtung ist entscheidend für die Stoßdämpfung. Der Sattel muss dem Schulterblatt \u00b12 cm Spielraum nach kranial/kaudal lassen \u2013 sonst wird das Pferd zum Schenkelgänger.`
    }
  },
  ruecken: {
    title: `Rücken & Wirbelsäule`, icon: "\u{1F9B4}",
    layers: {
      knochen: `18 Brustwirbel: Jeder trägt ein Rippenpaar \u2192 Brustkorb (schützt Herz und Lunge). Unterschiedlich lange Dornfortsätze bilden den Widerrist. 6 Lendenwirbel (Araber meist nur 5): Sehr breite Querfortsätze, nur über Muskeln gehalten. Kreuzbein: Verschmolzene Kreuzwirbel \u2192 Verbindung zum Becken über ISG. Erst mit 4\u20135 Jahren vollständig verknöchert! Facettengelenke (Schiebegelenke) verbinden die Wirbel. Wirbelkanal enthält das Rückenmark bis zum Lendenbereich.`,
      muskeln: `M. longissimus: Strecker und Seitwärtsbieger der Wirbelsäule. M. iliocostalis: Atmung + Seitwärtsbiegung. Mm. multifidii: Gelenkfixierung und Propriozeption. Zusammen = M. erector spinae. M. obliquus externus/internus abdominis: Beuger, Dreher. M. rectus abdominis: Beuger BWS/LWS. M. transversus abdominis: Bauchspannung. M. iliopsoas: Beidseitig = Setzen des Pferdes. Flexion des Rückens = Ziel der Reiterei; Extension = Wegdrücken.`,
      organe: `Geschützt durch den Brustkorb: Herz und Lunge. Die Leber angeschmiegt ans Zwerchfell (wird durch Atembewegung massiert \u2192 gute Durchblutung). Die Milz links kaudal der Leber (Blutspeicher + Filter). Die Nieren unterhalb der Wirbelsäule in der Lendenregion (links bohnenförmig, rechts herzförmig). Ca. 25% des Blutvolumens fließen durch die Nieren. Das Zwerchfell trennt Brust- und Bauchhöhle \u2013 wichtigster Atemmuskel.`,
      faszien: `Die thorakolumbale Faszie ist eine der wichtigsten Faszienstrukturen. Sie verbindet Rücken, Bauchmuskulatur und Schultergürtel. Das Nackenrückenband zieht sich über die gesamte Wirbelsäule bis zum Kreuzbein und bildet die Gegenspannung zur Bauchmuskulatur \u2013 essentiell für die korrekte Versammlungsarbeit.`
    }
  },
  bauch: {
    title: `Bauch & Verdauung`, icon: "\u{1FAC1}",
    layers: {
      knochen: `Die knöchernen Strukturen des Bauches: Die letzten Rippen (Rippenbögen) schützen den Bauchraum teilweise. Die Lendenwirbelsäule mit breiten Querfortsätzen bildet das Dach. Es gibt keine vollständige knöcherne Ummantelung \u2013 der Bauchraum wird hauptsächlich durch Muskeln und Faszien geformt.`,
      muskeln: `M. obliquus externus abdominis: Beidseitig Beugung BWS/LWS, einseitig Seitwärtsbiegung/Drehung. M. obliquus internus abdominis: Synergist bei Biegung, Antagonist bei Drehung. M. rectus abdominis: Hauptbeuger. M. transversus abdominis: Bauchspannung, Antagonist zur Rückenmuskulatur. M. iliopsoas: Setzen des Pferdes + Hüftbeugung. Bei Dampfrinne = deutlich ausgeprägte Bauchmuskulatur durch chronischen Husten.`,
      organe: `Magen: Relativ klein, ständige Magensäureproduktion \u2013 bei mehr als 4 Stunden ohne Raufutter drohen Magengeschwüre. Pferd kann nicht erbrechen! Dünndarm: 20\u201330 m lang, 40\u201350 L Fassungsvermögen, Passagezeit 1,5\u20132 h. Blinddarm: ca. 1 m, über 30 L \u2013 bakterielle Celluloseverdauung (Fohlen fressen Kot der Mutter!). Grimmdarm: bis 10 m, 50\u201360 L, viele Wendungen \u2192 Verstopfungs-/Sandkoliken. Leber: Entgiftung (schwächer als Hund!), Glucoseproduktion, Blutspeicher. Pankreas: Insulin/Glukagon. Pro kg Heu: bis 5 L Speichel.`,
      faszien: `Das Bauchfell (Peritoneum) kleidet die Bauchhöhle aus und umhüllt die Organe. Mesenterien befestigen den Darm an der Bauchwand. Die abdominalen Faszien verbinden die verschiedenen Bauchmuskelschichten für Bauchspannung.`
    }
  },
  kruppe: {
    title: `Kruppe & Hinterhand`, icon: "\u{1F434}",
    layers: {
      knochen: `Becken (Os pelvis): Ringförmig \u2013 Darmbein (Os ilium) \u2192 ISG, Schambein (Os pubis) \u2192 Symphyse (löst sich bei Geburt), Sitzbein (Os ischii). Tastbare Punkte: Darmbeinhöcker (höchster Punkt Kruppe), Hüfthöcker (seitlich), Sitzbeinhöcker (seitlich Anus). Hüftgelenk: Kugelgelenk, tief unter Muskulatur. Oberschenkel (Os femoris): Kurz, kräftig. Kniegelenk: Kniekehlgelenk (2 Menisken) + Kniescheibengelenk (Schlittengelenk).`,
      muskeln: `Mm. glutaei: Sichtbare Kruppe, Hüftgelenkstrecker. Gut gerittene Pferde haben sogenannte Hosen (wie Kniebundhose). Kranial: M. quadrizeps femoris + M. tensor fascia latae strecken Hüft-, Knie- und Sprunggelenk. Kaudal: M. biceps femoris, M. semimembranosus, M. semitendinosus. Medial: Adduktoren. Spannsägenkonstruktion: Knie und Sprunggelenk nur gemeinsam beug-/streckbar. Patellarsehne kann einhaken \u2192 Ruhen im Stehen (Fluchttieranpassung).`,
      organe: `Teile des Dickdarms (Grimmdarm mit Wendungen). Stute: Eierstöcke + Gebärmutter (Zyklus 3\u20134 Wochen, Trächtigkeit 11 Monate). Hengst: Hoden + Nebenhoden. Blase ventral im Becken. Harnröhre Stute sehr kurz. Mastdarm (Rectum). Kreuzbein enthält letzte Rückenmarksabschnitte. Parasympathikus innerviert von hier Harnblase, Mastdarm, Geschlechtsorgane. ISG ist empfindlich gegen Drehbewegungen.`,
      faszien: `Die Fascia glutaea bedeckt die Kruppenmuskulatur. Die Fascia lata umhüllt den Oberschenkel \u2013 der M. tensor fascia latae spannt diese Faszie und überträgt Kraft über das gesamte Hinterbein. Das straffe ISG (Iliosakralgelenk) verbindet Becken und Kreuzbein \u2013 empfindlich gegen Drehung, häufige Problemquelle.`
    }
  },
  vorderbein: {
    title: `Vorderbein`, icon: "\u{1F9BF}",
    layers: {
      knochen: `Unterarm: Nur Speiche (Os radius); Elle (Os ulna) verkümmert \u2192 bildet Ellbogenhöcker. Karpalgelenk: 3 Gelenkreihen + Erbsbein (Os pisiforme). Röhrbein (Os metacarpale III): Verlängerter Mittelfinger. Griffelbeine als Führungsschienen. Fesselgelenk: Scharniergelenk, 7 Haltebänder, Gleichbeine als Umlenkrollen. Fesselbein, Krongelenk (Sattelgelenk), Kronbein (ragt in Hufkapsel), Hufgelenk, Hufbein (über Lederhaut aufgehängt).`,
      muskeln: `Alle Muskeln enden oberhalb des Karpalgelenks \u2013 distal nur Sehnen und Bänder! Oberflächliche + tiefe Beugesehne (palmar). Strecksehne (dorsal). Fesselträger (M. interosseus medius): Teilt sich vor Fesselgelenk, umschließt Fesselkopf, verschmilzt mit Strecksehne. Fesselringband, Fesselplatte (vierzipfelig), Sohlenbinde. Sehnenscheiden schützen \u2013 bei Überlastung: Entzündung \u2192 Gallen. Belastungsanpassung Röhrbeine: Beim gerittenen Pferd quer-ovaler Querschnitt.`,
      organe: `Geringe Durchblutung distal \u2192 Sehnenverletzungen heilen langsamer als Muskelverletzungen. Anastomosen auf Höhe Karpalgelenk: Bei Kälte/Schock/Stress geöffnet \u2192 minimale Beindurchblutung \u2192 kalte Füße. Hufpumpe pumpt venöses Blut zurück. Muskelpumpe unterstützt. Venenklappen verhindern Rückfluss. Angelaufene Beine bei längerem Stehen. Lymphsystem transportiert Abfallstoffe ab.`,
      faszien: `Fascia antebrachii umhüllt den Unterarm. Sehnenscheiden = schützende Hüllen mit Flüssigkeit. Schleimbeutel = wassergefüllte Polster an Gelenken. Die enge Verbindung von Sehnen, Bändern und Faszien im distalen Bein bildet ein komplexes funktionelles System.`

  hinterbein: {
    title: `Hinterbein`, icon: "\u{1F9B5}",
    layers: {
      knochen: `Unterschenkel: Schienbein (Os tibia), Wadenbein (Os fibula) verkümmert. Sprunggelenk: Mehrere Knochen, Beugung nur am Kruralgelenk. Distale Knochenreihen = straffe Gelenke \u2192 bei Stoßbelastung: Entzündung \u2192 Verknöcherung = Spat. Sprunggelenkshöcker (Os calcaneus): Umlenkpunkt Beugesehnen \u2192 Piephacke/Hasenhacke bei mechanischer Reizung. Distal vom Sprunggelenk: Aufbau wie Vorderbein.`,
      muskeln: `Kranial: M. tibialis cranialis, M. fibularis tertius, Extensoren \u2192 Beugung Sprunggelenk + Streckung Zehen. Kaudal: M. gastrocnemius, Flexoren, M. popliteus \u2192 Streckung Sprung, Kniebeugung, Zehenbeugung. Spannsägenkonstruktion: Knie + Sprunggelenk nur gemeinsam beug-/streckbar. Patellarsehne kann über medialem Rollkamm einhaken \u2192 Knie fixiert \u2192 Ruhen im Stehen bei geringstem Kraftaufwand.`,
      organe: `Wie Vorderbein: Geringe Durchblutung distal. Anastomosen regulieren Beindurchblutung. Hufpumpe + Muskelpumpe essentiell für venösen Rückfluss. Angelaufene Beine bei langem Stehen. Lymphbahnen transportieren Abfallstoffe. Ständige ruhige Bewegung nötig für gute Durchblutung und Lymphabfluss.`,
      faszien: `Fascia cruris umhüllt Unterschenkel. Fascia lata über Oberschenkel. Achillessehne (Tendo calcaneus communis) = stärkste Sehnenstruktur. Die Spannsägenkonstruktion \u2013 eine faszial-tendinöse Koppelung \u2013 ist eine evolutionäre Anpassung des Fluchttieres.`

  huf: {

      muskeln: `Im Huf selbst keine Muskeln \u2013 nur Sehnen und Bänder! Oberflächliche + tiefe Beugesehne setzen am Huf-/Kronbein an. Strecksehne dorsal am Hufbein. Hufrollenapparat (Strahlbein + Schleimbeutel + tiefe Beugesehne) = kritische Struktur. Sohlenbinde stabilisiert von unten. Hufknorpel an Seiten des Hufbeins ermöglichen Elastizität.`,
      organe: `Lederhaut = die lebende Haut unter der Hornkapsel, produziert am Kronrand das Hufhorn und versorgt den Huf. Weiße Linie = feinste Lamellen-Verbindung. Hufkissen = Polster + Pumpmechanismus (Hufpumpe = Gegenpart zum Herzen). Hufhorn passt sich an Untergrund an. Beschädigter Kronrand ergibt schwaches Hufhorn und Risse. Futterringe am Huf = Hinweis auf Stoffwechselprobleme.`,

olikgefahr. Leber=Entgiftung (schwaecher als Hund). Pankreas=Insulin/Glukagon. Pferd kann nicht erbrechen. NIEREN: 25% Blutvolumen. 550L Primaerharn/24h. FORTPFLANZUNG: Stute ab 18Mon, Zyklus 3-4Wo, Traechtigkeit 11Mo. HAUT: Spiegel der Gesundheit. Saeureschutzmantel. Bis 10L Schweiss/h. NERVENSYSTEM: ZNS irreparabel. PNS regenerierbar. Sympathikus=Flucht, Parasympathikus=Ruhe. 360Grad Sicht, Vibrissen nicht scheren.`;

      '<div class="sa-ctrl-group"><span class="sa-ctrl-label">Ansicht</span><div class="sa-pills">' +
        '<button class="sa-pill' + (S.view==="seitlich"?" active":"") + '" data-view="seitlich">\u2194 Seitlich</button>' +
        '<button class="sa-pill' + (S.view==="frontal"?" active":"") + '" data-view="frontal">\u2191 Frontal</button>' +
        '<button class="sa-pill' + (S.view==="dorsal"?" active":"") + '" data-view="dorsal">\u2193 Dorsal</button>' +
      '</div></div>' +
      '<div class="sa-ctrl-group"><span class="sa-ctrl-label">Ebene</span><div class="sa-pills">' + layerBtns + '</div></div>' +
    '</div>' +

    '<div class="sa-main">' +
      '<div class="sa-model-area' + (r && !mob ? " with-info" : "") + '">' +
        '<div class="sa-model-card"><div class="sa-model-viewport">' + svgHtml + '</div>' +
        '<div class="sa-model-hint">' + (r && rd ? rd.icon + " " + rd.title + " \u2013 " + LAYERS[S.layer].label : "Tippe auf eine K\u00f6rperregion") + '</div></div>' +
      '</div>' +

      '<div class="sa-info' + (r ? " visible" : "") + '">' +
        (mob ? '<div class="sa-info-handle"><div class="sa-info-handle-bar"></div></div>' : '') +
        '<div class="sa-info-head"><div class="sa-info-title-wrap"><span class="sa-info-icon">' + (rd ? rd.icon : "") + '</span><span class="sa-info-title">' + (rd ? rd.title : "") + '</span></div>' +
        '<div class="sa-layer-badge">' + LAYERS[S.layer].icon + " " + LAYERS[S.layer].label + '</div></div>' +
        '<div class="sa-info-body"><p class="sa-info-text">' + rt + '</p></div>' +
        '<div class="sa-info-actions"><button class="sa-btn-chat" id="btnCD">\u{1FA7A} Im Chat vertiefen</button><button class="sa-btn-close-info" id="btnCI">\u2715 Schlie\u00dfen</button></div>' +
      '</div>' +
    '</div>' +

    '<button class="sa-fab" id="btnFab" style="' + (S.chatOpen ? "display:none" : "") + '">\u{1F4AC}</button>' +

    '<div class="sa-chat' + (S.chatOpen ? " visible" : "") + '">' +
      '<div class="sa-chat-head"><div class="sa-chat-head-left"><span style="font-size:16px">\u{1FA7A}</span><span class="sa-chat-head-title">Anatomie-Assistent</span></div><button class="sa-chat-close" id="btnCC">\u2715</button></div>' +
      '<div class="sa-chat-msgs" id="chatMsgs">' + msgsHtml + '</div>' +
      quickHtml +
      '<div class="sa-chat-input-area"><input class="sa-chat-input" id="chatIn" placeholder="Frage zur Pferdeanatomie..." autocomplete="off"/><button class="sa-chat-send" id="btnCS"' + (S.loading ? " disabled" : "") + '>\u2192</button></div>' +
    '</div>';

  bind();
  var cm = document.getElementById("chatMsgs");
  if (cm) setTimeout(function(){ cm.scrollTop = cm.scrollHeight; }, 50);
}

function esc(t) {
  var d = document.createElement("div");
  d.textContent = t;
  return d.innerHTML.replace(/\n/g, "<br>");
}

// ===== Event Binding =====
function bind() {
  document.querySelectorAll("[data-view]").forEach(function(b){ b.onclick = function(){ S.view = b.dataset.view; render(); }; });
  document.querySelectorAll("[data-layer]").forEach(function(b){ b.onclick = function(){ S.layer = b.dataset.layer; render(); }; });
  document.querySelectorAll("[data-region]").forEach(function(b){ b.onclick = function(){ S.sel = b.dataset.region; render(); }; });
  var ci = document.getElementById("btnCI");
  if (ci) ci.onclick = function(){ S.sel = null; render(); };
  var cd = document.getElementById("btnCD");
  if (cd) cd.onclick = function(){
    if (S.sel && ANATOMY_KB[S.sel]) {
      var rd = ANATOMY_KB[S.sel];
      S.chatOpen = true;
      render();
      setTimeout(function(){
        sendMsg("Erkl\u00e4re mir die " + rd.title + " des Pferdes \u2013 Ebene: " + LAYERS[S.layer].label + ". Was ist besonders wichtig f\u00fcr Therapeuten?");
      }, 100);
    }
  };
  var fab = document.getElementById("btnFab");
  if (fab) fab.onclick = function(){ S.chatOpen = true; render(); };
  var cc = document.getElementById("btnCC");
  if (cc) cc.onclick = function(){ S.chatOpen = false; render(); };
  var cs = document.getElementById("btnCS");
  var inp = document.getElementById("chatIn");
  if (cs && inp) {
    cs.onclick = function(){ var v = inp.value.trim(); if (v) sendMsg(v); };
    inp.onkeydown = function(e){ if (e.key === "Enter") { var v = inp.value.trim(); if (v) sendMsg(v); } };
  }
  document.querySelectorAll("[data-qq]").forEach(function(b){ b.onclick = function(){ sendMsg(b.dataset.qq); }; });
}

// ===== Chat API =====
async function sendMsg(text) {
  if (S.loading || !text) return;
  S.msgs.push({ role: "user", content: text });
  S.loading = true;
  render();

  try {
    var history = S.msgs.slice(-8).map(function(m){ return { role: m.role, content: m.content }; });
    var res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: "Du bist der Sanoanimal Anatomie-Assistent, ein freundlicher Tutor fuer Pferdeanatomie, basierend auf dem Buch Die Anatomie des Pferdes von Dr. Christina Fritz (Cadmos Verlag, 2011). Du antwortest ausschliesslich auf Deutsch.\n\nWISSENSBASIS:\n" + FULL_KB + "\n\nREGELN:\n- Antworte kurz, praezise und praxisnah (max 3-4 Absaetze)\n- Nutze nur Wissen aus der Wissensbasis\n- Wenn etwas nicht in der Wissensbasis steht, sage das ehrlich\n- Verwende Fachbegriffe mit Erklaerung in Klammern\n- Verweise auf relevante Zusammenhaenge (z.B. Fuetterung und Anatomie)\n- Beende mit einem kurzen Praxistipp oder einer Vertiefungsfrage wenn passend\n- Spreche die Therapeuten respektvoll und kollegial an",
        messages: history
      })
    });
    var data = await res.json();
    var reply = "";
    if (data.content) {
      for (var i = 0; i < data.content.length; i++) {
        if (data.content[i].text) reply += data.content[i].text;
      }
    }
    if (!reply) reply = "Entschuldigung, ich konnte keine Antwort generieren.";
    S.msgs.push({ role: "assistant", content: reply });
  } catch (err) {
    S.msgs.push({ role: "assistant", content: "Verbindungsfehler \u2013 bitte versuche es erneut. (" + err.message + ")" });
  }
  S.loading = false;
  render();
}

// ===== Init =====
window.addEventListener("resize", render);
render();
</script>
